  <polyline points="80,380 155,310 225,345 310,240 390,155"
    fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Arrow head -->
  <path d="M360,190 L390,155 L398,200" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
